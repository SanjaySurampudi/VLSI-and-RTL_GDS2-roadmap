<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLSI & RTL→GDS2 Roadmap — Sanju</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #13161e;
    --card: #1a1e28;
    --card-hover: #1f2433;
    --border: #2a2f3d;
    --border-bright: #3d4460;
    --text: #e8eaf0;
    --muted: #7a7f96;
    --dim: #4a5070;

    --phase1: #7c6af7;
    --phase1-bg: #1a1830;
    --phase1-dim: #3d3580;

    --phase2: #2dd4a0;
    --phase2-bg: #0d2520;
    --phase2-dim: #1a5a45;

    --phase3: #f59e2a;
    --phase3-bg: #201a0a;
    --phase3-dim: #6b4a10;

    --phase4: #e05a9a;
    --phase4-bg: #200f18;
    --phase4-dim: #6b2050;

    --phase5: #f87171;
    --phase5-bg: #200f0f;
    --phase5-dim: #6b2020;

    --done-bg: #0f1f16;
    --done-border: #2a5a3a;
    --done-text: #4ade80;
    --done-muted: #2d6b48;

    --radius: 10px;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.2px;
  }

  .header-left h1 span {
    color: var(--phase1);
  }

  .header-left p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── Overall progress ── */
  .overall-progress {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-track {
    width: 180px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--phase1), var(--phase2));
    border-radius: 3px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    min-width: 80px;
    text-align: right;
  }

  /* ── Timeline strip ── */
  .timeline-strip {
    display: flex;
    max-width: 1000px;
    margin: 24px auto 0;
    padding: 0 32px;
    gap: 4px;
  }

  .tbar {
    flex: 1;
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    padding: 6px 4px;
    border-radius: 6px;
    font-weight: 500;
    line-height: 1.4;
  }

  /* ── Main layout ── */
  main {
    max-width: 1000px;
    margin: 0 auto;
    padding: 32px;
  }

  /* ── Phase section ── */
  .phase {
    margin-bottom: 36px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .phase-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .phase-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .phase-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .phase-progress-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .phase-pct {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    min-width: 32px;
    text-align: right;
  }

  /* ── Task grid ── */
  .task-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 12px;
  }

  /* ── Task card ── */
  .task-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    user-select: none;
  }

  .task-card:hover {
    background: var(--card-hover);
    border-color: var(--border-bright);
    transform: translateY(-1px);
  }

  .task-card.done {
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  .task-card.done:hover {
    background: #112018;
  }

  /* ── Card top row ── */
  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .task-card.done .card-title {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--done-muted);
  }

  /* ── Checkbox ── */
  .check-btn {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border-bright);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .task-card.done .check-btn {
    background: var(--done-text);
    border-color: var(--done-text);
  }

  .check-btn svg {
    width: 13px;
    height: 13px;
    stroke: #fff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .task-card.done .check-btn svg {
    opacity: 1;
  }

  /* ── Card description ── */
  .card-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .task-card.done .card-desc {
    color: var(--done-muted);
  }

  /* ── Meta badges ── */
  .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .meta-badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }

  .meta-time {
    background: #1e1a0a;
    color: var(--phase3);
    border: 1px solid #3d3510;
  }

  .meta-skill {
    background: #0e1820;
    color: #60a5fa;
    border: 1px solid #1a3050;
  }

  /* ── Tool tags ── */
  .card-tools {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .tool-tag {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--dim);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 3px;
  }

  .task-card.done .tool-tag {
    color: var(--done-muted);
    background: var(--done-bg);
    border-color: var(--done-border);
  }

  /* ── Expand details ── */
  .card-points {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-points.open {
    display: block;
  }

  .card-points ul {
    padding-left: 16px;
  }

  .card-points ul li {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    line-height: 1.55;
  }

  .task-card.done .card-points ul li {
    color: var(--done-muted);
  }

  .expand-hint {
    font-size: 10px;
    color: var(--dim);
    margin-top: 8px;
    font-family: var(--mono);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .expand-hint svg {
    transition: transform 0.2s;
  }

  .task-card.expanded .expand-hint svg {
    transform: rotate(180deg);
  }

  /* ── Reset all ── */
  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    font-family: var(--mono);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }

  .reset-btn:hover {
    color: var(--phase4);
    border-color: var(--phase4);
  }

  /* ── Completion banner ── */
  .phase-done-banner {
    display: none;
    font-size: 11px;
    color: var(--done-text);
    font-family: var(--mono);
    background: var(--done-bg);
    border: 1px solid var(--done-border);
    border-radius: 6px;
    padding: 6px 14px;
    margin-top: 10px;
    align-items: center;
    gap: 6px;
  }

  .phase-done-banner.visible {
    display: flex;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }
</style>
</head>
<body>

<header>
  <div class="header-inner">

    <div style="display:flex;align-items:center;gap:16px;">

// ── Storage ──
const STORAGE_KEY = 'vlsi_roadmap_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

// ── Render ──
function render() {
  const container = document.getElementById('roadmap');
  container.innerHTML = '';

  PHASES.forEach(phase => {
    const section = document.createElement('section');
    section.className = 'phase';
    section.id = phase.id;

    const doneCount = phase.tasks.filter(t => state[t.id]).length;
    const total = phase.tasks.length;
    const pct = Math.round((doneCount / total) * 100);

    section.innerHTML = `
      <div class="phase-header">
        <span class="phase-badge" style="background:${phase.bg};color:${phase.color};border:1px solid ${phase.color}33;">
          ${phase.label}
        </span>
        <span class="phase-title">${doneCount}/${total} completed</span>
        <div class="phase-progress-bar">
          <div class="phase-progress-fill" style="width:${pct}%;background:${phase.color};"></div>
        </div>
        <span class="phase-pct" style="color:${phase.color};">${pct}%</span>
      </div>
      <div class="task-grid" id="grid-${phase.id}"></div>
      <div class="phase-done-banner ${doneCount === total ? 'visible' : ''}" id="banner-${phase.id}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Phase complete — well done!
      </div>
    `;

    container.appendChild(section);

    const grid = document.getElementById(`grid-${phase.id}`);
    phase.tasks.forEach(task => {
      const done = !!state[task.id];
      const card = document.createElement('div');
      card.className = `task-card ${done ? 'done' : ''}`;
      card.id = `card-${task.id}`;

      card.innerHTML = `
        <div class="card-top">
          <span class="card-title">${task.title}</span>
          <div class="check-btn" onclick="toggleDone(event,'${task.id}','${phase.id}')" title="Mark complete">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <p class="card-desc">${task.desc}</p>
        <div class="card-meta">
          <span class="meta-badge meta-time">⏱ ${task.time}</span>
          <span class="meta-badge meta-skill">${task.skill}</span>
        </div>
        <div class="card-tools">
          ${task.tools.map(t => `<span class="tool-tag">${t}</span>`).join('')}
        </div>
        <div class="card-points" id="pts-${task.id}">
          <ul>${task.points.map(p => `<li>${p}</li>`).join('')}</ul>
        </div>
        <div class="expand-hint" onclick="toggleExpand(event,'${task.id}')">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          details
        </div>
      `;

      card.addEventListener('click', (e) => {
        if (e.target.closest('.check-btn') || e.target.closest('.expand-hint')) return;
        toggleExpand(e, task.id);
      });

      grid.appendChild(card);
    });
  });

  updateOverall();
}

function toggleDone(e, taskId, phaseId) {
  e.stopPropagation();
  state[taskId] = !state[taskId];
  saveState(state);
  render();
}

function toggleExpand(e, taskId) {
  e.stopPropagation();
  const pts = document.getElementById(`pts-${taskId}`);
  const card = document.getElementById(`card-${taskId}`);
  pts.classList.toggle('open');
  card.classList.toggle('expanded');
}

function updateOverall() {
  const total = PHASES.reduce((a, p) => a + p.tasks.length, 0);
  const done = PHASES.reduce((a, p) => a + p.tasks.filter(t => state[t.id]).length, 0);
  const pct = Math.round((done / total) * 100);
  document.getElementById('overall-fill').style.width = pct + '%';
  document.getElementById('overall-label').textContent = `${done} / ${total} done`;
}

function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    state = {};
    saveState(state);
    render();
  }
}

render();
</script>
</body>
</html>
